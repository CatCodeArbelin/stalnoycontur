x-postgres-environment: &postgres-environment
  POSTGRES_DB: "${POSTGRES_DB:-stalnoycontur}"
  POSTGRES_USER: "${POSTGRES_USER:-stalnoycontur}"
  POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-stalnoycontur}"

x-backend-environment: &backend-environment
  APP_NAME: "${APP_NAME:-Stalnoy Contur API}"
  API_PREFIX: "${API_PREFIX:-/api}"
  DATABASE_URL: "${DATABASE_URL:-postgresql+psycopg://stalnoycontur:stalnoycontur@postgres:5432/stalnoycontur}"
  FRONTEND_URL: "${FRONTEND_URL:-http://localhost}"
  API_URL: "${API_URL:-http://localhost/api}"
  CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost,http://localhost:3000}"
  TELEGRAM_BOT_TOKEN: "${TELEGRAM_BOT_TOKEN:-${TG_BOT_TOKEN:-}}"
  TELEGRAM_CHAT_ID: "${TELEGRAM_CHAT_ID:-${TG_GROUP_ID:-}}"
  TELEGRAM_API_BASE_URL: "${TELEGRAM_API_BASE_URL:-https://api.telegram.org}"
  TELEGRAM_TIMEOUT_SECONDS: "${TELEGRAM_TIMEOUT_SECONDS:-8}"
  RATE_LIMIT_REQUESTS: "${RATE_LIMIT_REQUESTS:-60}"
  RATE_LIMIT_WINDOW_SECONDS: "${RATE_LIMIT_WINDOW_SECONDS:-60}"
  IMAGES_ROOT: "${IMAGES_ROOT:-/images}"
  UPLOAD_DIR: "${UPLOAD_DIR:-/images/uploads}"
  UPLOAD_PATH: "${UPLOAD_PATH:-/images/uploads}"
  CASES_DIR: "${CASES_DIR:-/images/cases}"
  GALLERY_DIR: "${GALLERY_DIR:-/images/gallery}"
  REVIEWS_DIR: "${REVIEWS_DIR:-/images/reviews}"
  PRODUCTION_DIR: "${PRODUCTION_DIR:-/images/production}"
  UPLOAD_URL_PREFIX: "${UPLOAD_URL_PREFIX:-/images/uploads}"
  UPLOAD_MAX_SIZE_BYTES: "${UPLOAD_MAX_SIZE_BYTES:-10485760}"
  UPLOAD_MAX_WIDTH: "${UPLOAD_MAX_WIDTH:-1920}"
  UPLOAD_MAX_HEIGHT: "${UPLOAD_MAX_HEIGHT:-1920}"
  UPLOAD_WEBP_QUALITY: "${UPLOAD_WEBP_QUALITY:-82}"
  ADMIN_USERNAME: "${ADMIN_USERNAME:-admin}"
  ADMIN_PASSWORD: "${ADMIN_PASSWORD:-change-me}"
  ADMIN_TOKEN: "${ADMIN_TOKEN:-}"
  ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET:-dev-secret-change-me}"
  ADMIN_TOKEN_TTL_SECONDS: "${ADMIN_TOKEN_TTL_SECONDS:-43200}"

services:
  postgres:
    image: postgres:16-alpine
    environment: *postgres-environment
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment: *backend-environment
    volumes:
      - uploaded_images:/images
      - backend_logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-http://localhost}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost/api}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - uploaded_images:/images:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/nginx-health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  postgres_data:
  uploaded_images:
  nginx_logs:
  backend_logs:
